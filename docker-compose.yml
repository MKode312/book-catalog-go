services:

  book-catalog:
    container_name: book-catalog
    command: sh -c "/app/migrator & /app/book-catalog wait"
    depends_on:
      books-db:
        condition: service_healthy
      books-cache:
        condition: service_healthy
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    tty: true
    volumes:
      - ./config:/app/config:ro
      - ./migrations:/app/migrations:ro
    ports:
      - "8082:8082"
    networks:
      - books_net
    restart: unless-stopped 

  books-db:
    image: postgres:15
    container_name: books-db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - books_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - books_net
    restart: unless-stopped

  books-cache:
    image: redis:7-alpine
    container_name: books-cache
    ports:
      - "6379:6379"
    networks:
      - books_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    
networks:
  books_net:


volumes: 
  books_postgres_data: