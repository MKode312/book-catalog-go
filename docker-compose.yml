services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - book-catalog
    networks:
      - books_net
    restart: unless-stopped

  book-catalog:
    command: sh -c "/app/migrator && /app/book-catalog"
    depends_on:
      books-db:
        condition: service_healthy
      books-cache:
        condition: service_healthy
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    tty: true # optional, logs colour
    volumes:
      - ./config:/app/config:ro
      - ./migrations:/app/migrations:ro
    networks:
      - books_net
    restart: unless-stopped

  books-db:
    image: postgres:15
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - books_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - books_net
    restart: unless-stopped

  books-cache:
    image: redis:7-alpine
    networks:
      - books_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

networks:
  books_net:

volumes:
  books_postgres_data:
